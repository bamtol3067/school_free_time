<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>랜덤 채팅 · 공강녹이기</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <a href="/" class="logo">공강<span class="accent-red">녹이기</span></a>
      <div class="header-center">
        <span class="header-title">랜덤 채팅</span>
        <div id="status" class="status-badge waiting">상대방을 찾는 중...</div>
      </div>
      <button id="home-btn" class="home-btn">← 메인으로</button>
    </div>
  </header>

  <!-- CHAT SECTION -->
  <section id="chat-container">
    <div class="chat-panel">
      <div id="chat-box"></div>
      <div id="input-area">
        <input id="message-input" type="text" placeholder="메시지를 입력하세요…" autocomplete="off">
        <button id="send-btn">전송 →</button>
      </div>
    </div>
  </section>

  <script src="/socket.io/socket.io.js"></script>
  <script src="index.js"></script>
</body>
</html>
