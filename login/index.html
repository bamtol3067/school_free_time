<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 · 공강녹이기</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="page-wrap">

    <!-- LEFT PANEL -->
    <div class="left-panel">
      <div class="left-bg">
        <img
          src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?w=900&auto=format&fit=crop&q=80"
          alt="도서관"
          class="left-img"
        />
        <div class="left-overlay"></div>
      </div>
      <div class="left-content">
        <a href="/" class="back-link">← 홈으로</a>
        <div class="left-logo">공강<span class="accent-red">녹이기</span></div>
        <p class="left-tagline">공강 시간을<br>더 알차게</p>
        <p class="left-desc">도서관 자리 예약, 랜덤채팅,<br>주변 장소 추천까지 한 번에</p>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
      <div class="form-wrap">

        <div class="form-header">
          <p class="form-tag">WELCOME BACK</p>
          <h1 class="form-title">로그인</h1>
          <p class="form-sub">도서관 시스템에 접속합니다</p>
        </div>

        <form id="login-form" class="login-form">

          <div class="field-group">
            <label for="username" class="field-label">아이디</label>
            <div class="input-wrap">
              <span class="input-icon">👤</span>
              <input type="text" id="username" class="field-input" placeholder="아이디를 입력하세요" required>
            </div>
          </div>

          <div class="field-group">
            <label for="password" class="field-label">비밀번호</label>
            <div class="input-wrap">
              <span class="input-icon">🔒</span>
              <input type="password" id="password" class="field-input" placeholder="비밀번호를 입력하세요" required>
            </div>
          </div>

          <button type="submit" class="submit-btn">로그인하기 →</button>

        </form>

        <div id="message" class="message"></div>

        <p class="form-footer-note">© 2026 공강녹이기</p>
      </div>
    </div>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="index.js"></script>
</body>
</html>
